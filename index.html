<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIIT Generator</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HIIT">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --accent: #e8ff00;
    --accent2: #ff4444;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2a2a2a;
    --kb: #4a9eff;
    --pb: #ff6b35;
    --cs: #a855f7;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow-y: auto;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    background: var(--bg);
  }

  #screenMain { transform: translateX(0); z-index: 1; }
  #screenExercise { transform: translateX(100%); z-index: 2; }
  #screenMain.slide-out { transform: translateX(-30%); }
  #screenExercise.slide-in { transform: translateX(0); }

  .screen-inner {
    padding: calc(20px + var(--safe-top)) 16px calc(60px + var(--safe-bottom));
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
    line-height: 1;
  }

  .subtitle {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .setting-item label { display: block; font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }

  .setting-item select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    padding: 10px 12px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-item select:focus { border-color: var(--accent); }

  .equipment-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }

  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.8rem;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .chip.kb.active { border-color: var(--kb); color: var(--kb); background: rgba(74,158,255,0.1); }
  .chip.pb.active { border-color: var(--pb); color: var(--pb); background: rgba(255,107,53,0.1); }
  .chip.cs.active { border-color: var(--cs); color: var(--cs); background: rgba(168,85,247,0.1); }

  .btn-edit-ex {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-edit-ex:active { border-color: var(--accent); color: var(--accent); }

  .btn-generate {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 16px;
  }
  .btn-generate:active { transform: scale(0.98); background: #d4e800; }

  .workout-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    display: none;
  }
  .workout-card.visible { display: block; }

  .workout-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
  .summary-stat { text-align: center; background: var(--surface2); border-radius: 8px; padding: 10px 4px; }
  .summary-stat .val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); line-height: 1; }
  .summary-stat .lbl { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 2px; }

  .round-block { margin-bottom: 16px; }
  .round-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 8px; }

  .exercise-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .ex-num { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--muted); min-width: 22px; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 0.9rem; }
  .ex-muscle { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
  .ex-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .ex-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 999px; font-weight: 700; letter-spacing: 0.05em; }
  .badge-kb { background: rgba(74,158,255,0.2); color: var(--kb); }
  .badge-pb { background: rgba(255,107,53,0.2); color: var(--pb); }
  .badge-cs { background: rgba(168,85,247,0.2); color: var(--cs); }
  .muscle-badge {
    font-size: 0.55rem;
    padding: 1px 6px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }

  /* タイマー */
  .timer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }
  .timer-card.visible { display: block; }
  .timer-phase { font-size: 0.65rem; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  .timer-exercise-name { font-family: 'Noto Sans JP', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; min-height: 1.5em; }
  .timer-muscle { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; min-height: 1em; }
  .timer-next { font-size: 0.7rem; color: var(--muted); margin-bottom: 16px; min-height: 1.2em; }
  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 20vw, 8rem);
    line-height: 1;
    margin-bottom: 12px;
    transition: color 0.3s;
  }
  .timer-display.work { color: var(--accent); }
  .timer-display.rest { color: var(--kb); }
  .timer-display.prep { color: #ff9900; }
  .timer-display.done { color: #44ff88; }
  .timer-progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .timer-progress-fill { height: 100%; border-radius: 2px; transition: width 0.1s linear, background 0.3s; }
  .timer-round-info { font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; }
  .timer-controls { display: flex; gap: 10px; justify-content: center; }
  .btn-timer { padding: 14px 28px; border-radius: 10px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s; }
  .btn-pause { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-stop { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-stop:active { border-color: var(--accent2); color: var(--accent2); }

  /* 種目編集画面 */
  .ex-screen-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: calc(16px + var(--safe-top)) 16px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .btn-back {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .btn-back:active { border-color: var(--accent); }
  .ex-screen-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.1em; color: var(--accent); flex: 1; }
  .btn-reset-all {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.7rem;
    cursor: pointer;
  }
  .btn-reset-all:active { border-color: var(--accent2); color: var(--accent2); }

  .ex-screen-body { padding: 16px 16px calc(60px + var(--safe-bottom)); }
  .ex-section { margin-bottom: 24px; }
  .ex-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ex-section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.2em; }
  .ex-section-title.kb { color: var(--kb); }
  .ex-section-title.pb { color: var(--pb); }
  .ex-section-title.cs { color: var(--cs); }
  .ex-section-count { font-size: 0.7rem; color: var(--muted); }

  /* 競合グループラベル */
  .group-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 8px 4px 4px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    margin-bottom: 4px;
  }
  .group-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }

  .ex-toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.2s;
  }
  .ex-toggle-row:active { border-color: var(--accent); }
  .ex-toggle-row.off { opacity: 0.4; }

  .ex-toggle-info { flex: 1; min-width: 0; pointer-events: none; }
  .ex-toggle-name { font-size: 0.88rem; }
  .ex-toggle-muscle { font-size: 0.62rem; color: var(--muted); margin-top: 2px; }

  .toggle-switch { position: relative; width: 44px; height: 26px; flex-shrink: 0; pointer-events: none; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 999px;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .ex-toggle-row.on .toggle-track { background: var(--accent); }
  .ex-toggle-row.on .toggle-track::after { transform: translateX(18px); }
</style>
</head>
<body>

<!-- メイン画面 -->
<div class="screen" id="screenMain">
  <div class="screen-inner">
    <h1>HIIT GENERATOR</h1>
    <p class="subtitle">KETTLE BELL · PUSH-UP BAR · CHIN-UP STAND</p>

    <div class="card">
      <div class="card-title">⚙ Settings</div>
      <div class="settings-grid">
        <div class="setting-item">
          <label>種目数（1周あたり）</label>
          <select id="exerciseCount">
            <option value="3">3種目</option>
            <option value="4">4種目</option>
            <option value="5" selected>5種目</option>
            <option value="6">6種目</option>
            <option value="7">7種目</option>
            <option value="8">8種目</option>
          </select>
        </div>
        <div class="setting-item">
          <label>周回数</label>
          <select id="rounds">
            <option value="1">1周</option>
            <option value="2">2周</option>
            <option value="3" selected>3周</option>
            <option value="4">4周</option>
            <option value="5">5周</option>
          </select>
        </div>
        <div class="setting-item">
          <label>ワーク時間</label>
          <select id="workTime">
            <option value="20">20秒</option>
            <option value="30">30秒</option>
            <option value="40" selected>40秒</option>
            <option value="45">45秒</option>
            <option value="60">60秒</option>
          </select>
        </div>
        <div class="setting-item">
          <label>レスト時間</label>
          <select id="restTime">
            <option value="10">10秒</option>
            <option value="15">15秒</option>
            <option value="20" selected>20秒</option>
            <option value="30">30秒</option>
            <option value="45">45秒</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🏋 器具</div>
      <div class="equipment-row">
        <div class="chips">
          <button class="chip kb active" id="chip-kb" onclick="toggleChip('kb')">ケトルベル</button>
          <button class="chip pb" id="chip-pb" onclick="toggleChip('pb')">プッシュアップバー</button>
          <button class="chip cs" id="chip-cs" onclick="toggleChip('cs')">チンニングスタンド</button>
        </div>
        <button class="btn-edit-ex" onclick="openExScreen()">種目を編集 ›</button>
      </div>
    </div>

    <button class="btn-generate" onclick="generateWorkout()">▶ メニューを生成</button>

    <div class="workout-card" id="workoutCard">
      <div class="card-title">📋 本日のメニュー</div>
      <div class="workout-summary" id="workoutSummary"></div>
      <div id="workoutList"></div>
      <div style="margin-top:16px;">
        <button class="btn-generate" onclick="startTimer()" style="margin-bottom:0;">⏱ タイマースタート</button>
      </div>
    </div>

    <div class="timer-card" id="timerCard">
      <div class="timer-phase" id="timerPhase">READY</div>
      <div class="timer-exercise-name" id="timerExName">—</div>
      <div class="timer-muscle" id="timerMuscle"></div>
      <div class="timer-next" id="timerNext"></div>
      <div class="timer-display prep" id="timerDisplay">10</div>
      <div class="timer-progress-bar"><div class="timer-progress-fill" id="progressFill" style="width:100%"></div></div>
      <div class="timer-round-info" id="timerRoundInfo"></div>
      <div class="timer-controls">
        <button class="btn-timer btn-pause" id="btnPause" onclick="togglePause()" style="display:none">⏸ 一時停止</button>
        <button class="btn-timer btn-stop" onclick="stopTimer()">■ 停止</button>
      </div>
    </div>
  </div>
</div>

<!-- 種目編集画面 -->
<div class="screen" id="screenExercise">
  <div class="ex-screen-header">
    <button class="btn-back" onclick="closeExScreen()">← 戻る</button>
    <div class="ex-screen-title">EXERCISES</div>
    <button class="btn-reset-all" onclick="resetAll()">すべてON</button>
  </div>
  <div class="ex-screen-body" id="exScreenBody"></div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

// ===== 種目データ =====
// group: 同グループから最大1種しか選ばない（null=制限なし）
const EXERCISES = {
  kb: [
    // スイング系
    { id:'kb01', name:'ロシアンスイング',           muscle:'後面連鎖・体幹',   group:'swing' },
    { id:'kb02', name:'アメリカンスイング',          muscle:'全身・体幹',       group:'swing' },
    // スクワット系
    { id:'kb03', name:'ゴブレットスクワット',        muscle:'下半身・体幹',     group:'squat' },
    { id:'kb04', name:'スクワット＆プレス',          muscle:'全身',             group:'squat' },
    // デッドリフト系
    { id:'kb05', name:'デッドリフト',               muscle:'後面連鎖・体幹',   group:'dead' },
    { id:'kb06', name:'シングルレッグデッドリフト',  muscle:'後面連鎖・体幹',   group:'dead' },
    // ランジ系
    { id:'kb07', name:'リバースランジ',             muscle:'下半身・体幹',     group:'lunge' },
    { id:'kb08', name:'サイドランジ',               muscle:'下半身・内転筋',   group:'lunge' },
    // プル系
    { id:'kb09', name:'クリーン',                   muscle:'全身・体幹',       group:'pull' },
    { id:'kb10', name:'スナッチ',                   muscle:'全身・肩',         group:'pull' },
    { id:'kb11', name:'ロウ',                       muscle:'背中・上腕二頭筋', group:'pull' },
    // プレス系
    { id:'kb12', name:'オーバーヘッドプレス',       muscle:'肩・上腕三頭筋',   group:null },
    // その他
    { id:'kb13', name:'ケトルベルヘイロー',         muscle:'肩・体幹',         group:null },
    { id:'kb14', name:'ウィンドミル',               muscle:'体幹・肩',         group:null },
    { id:'kb15', name:'ターキッシュゲットアップ',   muscle:'全身・体幹',       group:null },
    { id:'kb16', name:'ファーマーズウォーク（その場）', muscle:'体幹・握力',   group:null },
  ],
  pb: [
    { id:'pb01', name:'プッシュアップ',             muscle:'胸・肩・上腕三頭筋', group:'push' },
    { id:'pb02', name:'ワイドプッシュアップ',       muscle:'胸（外側）・肩',     group:'push' },
    { id:'pb03', name:'ダイヤモンドプッシュアップ', muscle:'上腕三頭筋・胸',     group:'push' },
    { id:'pb04', name:'テンポプッシュアップ（3秒下降）', muscle:'胸・体幹',      group:'push' },
    { id:'pb05', name:'アーチャープッシュアップ',   muscle:'胸（片側）・体幹',   group:'push' },
    { id:'pb06', name:'パイクプッシュアップ',       muscle:'肩・上腕三頭筋',     group:null   },
  ],
  cs: [
    { id:'cs01', name:'プルアップ（順手）',         muscle:'背中・上腕二頭筋', group:'pull' },
    { id:'cs02', name:'チンアップ（逆手）',         muscle:'背中・上腕二頭筋', group:'pull' },
    { id:'cs03', name:'ワイドグリッププルアップ',   muscle:'背中（広背筋）',   group:'pull' },
    { id:'cs04', name:'ハングニーレイズ',           muscle:'体幹・腸腰筋',     group:null   },
    { id:'cs05', name:'ディップス',                 muscle:'胸・肩・上腕三頭筋', group:null },
  ]
};

// 有効種目セット（id管理）
const enabled = {
  kb: new Set(EXERCISES.kb.map(e => e.id)),
  pb: new Set(EXERCISES.pb.map(e => e.id)),
  cs: new Set(EXERCISES.cs.map(e => e.id))
};

const chips = { kb: true, pb: false, cs: false };
let generatedMenu = [];
let timerState = null;
let timerInterval = null;

// ===== 器具チップ =====
function toggleChip(type) {
  chips[type] = !chips[type];
  document.getElementById('chip-' + type).classList.toggle('active', chips[type]);
}

// ===== 種目編集画面 =====
function openExScreen() {
  renderExScreen();
  document.getElementById('screenMain').classList.add('slide-out');
  document.getElementById('screenExercise').classList.add('slide-in');
  document.getElementById('screenExercise').scrollTop = 0;
}

function closeExScreen() {
  document.getElementById('screenMain').classList.remove('slide-out');
  document.getElementById('screenExercise').classList.remove('slide-in');
}

function resetAll() {
  Object.keys(EXERCISES).forEach(type => {
    enabled[type] = new Set(EXERCISES[type].map(e => e.id));
  });
  renderExScreen();
}

function toggleExercise(type, id) {
  const isOn = enabled[type].has(id);
  // KBは最低1種残す
  if (isOn && type === 'kb' && enabled[type].size <= 1) return;
  if (isOn) { enabled[type].delete(id); } else { enabled[type].add(id); }
  const row = document.getElementById('exrow-' + id);
  if (row) {
    const nowOn = enabled[type].has(id);
    row.classList.toggle('on', nowOn);
    row.classList.toggle('off', !nowOn);
  }
  const countEl = document.getElementById('count-' + type);
  if (countEl) countEl.textContent = enabled[type].size + ' / ' + EXERCISES[type].length;
}

function renderExScreen() {
  const secLabels = { kb: 'KETTLE BELL', pb: 'PUSH-UP BAR', cs: 'CHIN-UP STAND' };
  const groupLabels = {
    swing: 'スイング系', squat: 'スクワット系', dead: 'デッドリフト系',
    lunge: 'ランジ系', pull: 'プル系', push: 'プッシュ系'
  };

  let html = '';
  Object.entries(EXERCISES).forEach(([type, exList]) => {
    html += `<div class="ex-section">
      <div class="ex-section-header">
        <div class="ex-section-title ${type}">${secLabels[type]}</div>
        <div class="ex-section-count" id="count-${type}">${enabled[type].size} / ${exList.length}</div>
      </div>`;

    // グループ別に表示
    let lastGroup = undefined;
    exList.forEach(ex => {
      const grpKey = ex.group || '__none__';
      if (grpKey !== lastGroup) {
        lastGroup = grpKey;
        if (ex.group && groupLabels[ex.group]) {
          html += `<div class="group-label">${groupLabels[ex.group]}（同グループから最大1種）</div>`;
        } else if (lastGroup === '__none__' && exList.some(e => e.group)) {
          html += `<div class="group-label">その他</div>`;
        }
      }
      const isOn = enabled[type].has(ex.id);
      html += `<div class="ex-toggle-row ${isOn ? 'on' : 'off'}" id="exrow-${ex.id}" onclick="toggleExercise('${type}', '${ex.id}')">
        <div class="ex-toggle-info">
          <div class="ex-toggle-name">${ex.name}</div>
          <div class="ex-toggle-muscle">${ex.muscle}</div>
        </div>
        <div class="toggle-switch"><div class="toggle-track"></div></div>
      </div>`;
    });

    html += `</div>`;
  });
  document.getElementById('exScreenBody').innerHTML = html;
}

// ===== メニュー生成 =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickExercises(type, count) {
  const pool = EXERCISES[type].filter(e => enabled[type].has(e.id));
  const shuffled = shuffle(pool);
  const picked = [];
  const usedGroups = new Set();

  for (const ex of shuffled) {
    if (picked.length >= count) break;
    // 競合グループチェック
    if (ex.group && usedGroups.has(ex.group)) continue;
    picked.push(ex);
    if (ex.group) usedGroups.add(ex.group);
  }
  return picked;
}

function generateWorkout() {
  const count = parseInt(document.getElementById('exerciseCount').value);
  const rounds = parseInt(document.getElementById('rounds').value);
  const workTime = parseInt(document.getElementById('workTime').value);
  const restTime = parseInt(document.getElementById('restTime').value);

  const usePB = chips.pb && enabled.pb.size > 0 && Math.random() < 0.5;
  const useCS = chips.cs && enabled.cs.size > 0 && Math.random() < 0.5;
  let slots = [];

  if (usePB) {
    const picked = pickExercises('pb', 1);
    if (picked.length) slots.push({ ...picked[0], equipType: 'pb' });
  }
  if (useCS) {
    const picked = pickExercises('cs', 1);
    if (picked.length) slots.push({ ...picked[0], equipType: 'cs' });
  }

  const kbNeeded = count - slots.length;
  const kbPicked = pickExercises('kb', kbNeeded);
  kbPicked.forEach(e => slots.push({ ...e, equipType: 'kb' }));
  slots = shuffle(slots);

  generatedMenu = { slots, rounds, workTime, restTime };

  const totalSec = rounds * slots.length * (workTime + restTime);
  const mins = Math.floor(totalSec / 60);
  const secs = totalSec % 60;
  document.getElementById('workoutSummary').innerHTML = `
    <div class="summary-stat"><div class="val">${slots.length}</div><div class="lbl">EXERCISES</div></div>
    <div class="summary-stat"><div class="val">${rounds}</div><div class="lbl">ROUNDS</div></div>
    <div class="summary-stat"><div class="val">${workTime}s</div><div class="lbl">WORK</div></div>
    <div class="summary-stat"><div class="val">${mins}:${String(secs).padStart(2,'0')}</div><div class="lbl">TOTAL</div></div>
  `;

  let html = '';
  for (let r = 0; r < rounds; r++) {
    html += `<div class="round-block"><div class="round-label">ROUND ${r + 1}</div>`;
    slots.forEach((s, i) => {
      const lbl = { kb:'KB', pb:'PB', cs:'CS' };
      html += `<div class="exercise-item">
        <span class="ex-num">${i + 1}</span>
        <div class="ex-info">
          <div class="ex-name">${s.name}</div>
          <div class="ex-muscle">${s.muscle}</div>
        </div>
        <div class="ex-right">
          <span class="ex-badge badge-${s.equipType}">${lbl[s.equipType]}</span>
          <span class="muscle-badge">${s.muscle}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  document.getElementById('workoutList').innerHTML = html;
  document.getElementById('workoutCard').classList.add('visible');
  document.getElementById('timerCard').classList.remove('visible');
  document.getElementById('workoutCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== Audio =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function beep(freq, dur, type = 'sine', vol = 0.5) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playWorkStart() { beep(880, 0.1); setTimeout(() => beep(1100, 0.15), 120); }
function playRestStart() { beep(440, 0.2, 'triangle', 0.4); }
function playCountdown() { beep(660, 0.08, 'square', 0.3); }
function playDone() {
  beep(523, 0.1); setTimeout(() => beep(659, 0.1), 120);
  setTimeout(() => beep(784, 0.1), 240); setTimeout(() => beep(1047, 0.25), 380);
}

// ===== タイマー =====
function buildQueue() {
  const { slots, rounds, workTime, restTime } = generatedMenu;
  const queue = [{ phase: 'prep', duration: 10, name: '準備', muscle: '', next: slots[0].name }];
  for (let r = 0; r < rounds; r++) {
    for (let i = 0; i < slots.length; i++) {
      const s = slots[i];
      const nextEx = slots[i+1] ? slots[i+1].name : (r+1 < rounds ? slots[0].name + '（次ラウンド）' : null);
      queue.push({ phase: 'work', duration: workTime, name: s.name, muscle: s.muscle, next: nextEx, round: r+1, ex: i+1, totalEx: slots.length, totalRound: rounds });
      if (i < slots.length - 1 || r < rounds - 1) {
        const restNext = slots[i+1] ? slots[i+1].name : slots[0].name;
        queue.push({ phase: 'rest', duration: restTime, name: 'レスト', muscle: '', next: restNext, round: r+1, ex: i+1, totalEx: slots.length, totalRound: rounds });
      }
    }
  }
  queue.push({ phase: 'done', duration: 0, name: '完了！', muscle: '', next: null });
  return queue;
}

function startTimer() {
  // iOSはタップと同期してAudioContextを初期化・resumeしないと音が出ない
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const unlock = ctx.createOscillator();
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.001, ctx.currentTime);
  unlock.connect(g); g.connect(ctx.destination);
  unlock.start(); unlock.stop(ctx.currentTime + 0.01);

  const queue = buildQueue();
  timerState = { queue, idx: 0, remaining: queue[0].duration, paused: false };
  document.getElementById('timerCard').classList.add('visible');
  document.getElementById('timerCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('btnPause').style.display = 'inline-block';
  renderTimer();
  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 100);
}

let lastSec = -1;

function tick() {
  if (!timerState || timerState.paused) return;
  const s = timerState;
  const current = s.queue[s.idx];
  if (current.phase === 'done') return;
  s.remaining -= 0.1;
  const secNow = Math.ceil(s.remaining);
  if (secNow !== lastSec) {
    lastSec = secNow;
    if (['prep','work','rest'].includes(current.phase) && secNow <= 5 && secNow > 0) playCountdown();
  }
  if (s.remaining <= 0) {
    s.idx++;
    if (s.idx >= s.queue.length) { finishTimer(); return; }
    const next = s.queue[s.idx];
    s.remaining = next.duration;
    lastSec = -1;
    if (next.phase === 'work') playWorkStart();
    else if (next.phase === 'rest') playRestStart();
    else if (next.phase === 'done') { playDone(); finishTimer(); return; }
  }
  renderTimer();
}

function renderTimer() {
  const s = timerState;
  const current = s.queue[s.idx];
  const display = document.getElementById('timerDisplay');
  const fill = document.getElementById('progressFill');
  const phaseLabels = { prep: '準備', work: 'WORK', rest: 'REST', done: '完了' };
  document.getElementById('timerPhase').textContent = phaseLabels[current.phase] || current.phase;
  document.getElementById('timerExName').textContent = current.name;
  document.getElementById('timerMuscle').textContent = current.muscle || '';
  document.getElementById('timerNext').textContent = current.next ? `次: ${current.next}` : '';
  display.textContent = current.phase === 'done' ? '🏁' : Math.ceil(s.remaining);
  display.className = `timer-display ${current.phase}`;
  const pct = current.duration > 0 ? (s.remaining / current.duration) * 100 : 0;
  fill.style.width = pct + '%';
  const fillColors = { prep: '#ff9900', work: 'var(--accent)', rest: 'var(--kb)', done: '#44ff88' };
  fill.style.background = fillColors[current.phase] || 'var(--accent)';
  if (current.round) {
    document.getElementById('timerRoundInfo').textContent = `Round ${current.round} / ${current.totalRound}  ·  ${current.ex} / ${current.totalEx}`;
  } else {
    document.getElementById('timerRoundInfo').textContent = '';
  }
}

function finishTimer() {
  clearInterval(timerInterval);
  timerState.remaining = 0;
  const display = document.getElementById('timerDisplay');
  display.textContent = '🏁';
  display.className = 'timer-display done';
  document.getElementById('timerPhase').textContent = 'COMPLETE';
  document.getElementById('timerExName').textContent = 'お疲れ様でした！';
  document.getElementById('timerMuscle').textContent = '';
  document.getElementById('timerNext').textContent = '';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressFill').style.background = '#44ff88';
  document.getElementById('btnPause').style.display = 'none';
}

function togglePause() {
  if (!timerState) return;
  timerState.paused = !timerState.paused;
  document.getElementById('btnPause').textContent = timerState.paused ? '▶ 再開' : '⏸ 一時停止';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerState = null;
  document.getElementById('timerCard').classList.remove('visible');
}
</script>
